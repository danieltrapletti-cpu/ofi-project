function aggiornaStatoPreventivo(id, nuovoStato) {
  const docRef = db.collection("preventivi").doc(id);
  const campoData = nuovoStato === "approvato" ? "dataApprovazione" : "dataRifiuto";
  const payload = {
    stato: nuovoStato,
    [campoData]: firebase.firestore.Timestamp.now()
  };

  docRef.update(payload).then(() => {
    alert("✅ Preventivo aggiornato");
    location.reload(); // reload semplice
  }).catch(err => {
    alert("Errore durante l'aggiornamento");
    console.error(err);
  });
}


function calcolaCountdown(dataApprovazione) {
  const scadenza = new Date(dataApprovazione.toDate().getTime() + 7 * 24 * 60 * 60 * 1000);
  const now = new Date();
  const diff = scadenza - now;
  if (diff <= 0) return "❌ Scaduto";
  const giorni = Math.floor(diff / (1000 * 60 * 60 * 24));
  const ore = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minuti = Math.floor((diff / (1000 * 60)) % 60);
  return `⏳ Scade tra ${giorni}g ${ore}h ${minuti}m`;
}

function contaPreventivi() {
  const attesa = tutti.filter(p => p.stato === 'in attesa').length;
  const approvati = tutti.filter(p => p.stato === 'approvato').length;
  const rifiutati = tutti.filter(p => p.stato === 'rifiutato').length;
  const scaduti = tutti.filter(p => p.stato === 'scaduto').length;

  document.getElementById("btn-attesa").innerHTML = `🟡 In Attesa (${attesa})`;
  document.getElementById("btn-approvato").innerHTML = `🟢 Approvati (${approvati})`;
  document.getElementById("btn-rifiutato").innerHTML = `🔴 Rifiutati (${rifiutati})`;
  document.getElementById("btn-scaduto").innerHTML = `🕓 Scaduti (${scaduti})`;
}

};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
const tutti = [];

function mostraTab(nome) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('[onclick="mostraTab(\'' + nome + '\')"]').classList.add('active');
  document.getElementById('tab-' + nome).classList.add('active');
}

function chiudiModal() {
  document.getElementById("modal").style.display = "none";
}

function apriModal(id) {
  const p = tutti.find(x => x.id === id);
  if (!p) return;

  function formatDate(d) {
    return d?.toDate?.().toLocaleString?.() || '-';
  }

  let html = `<h3>📄 Dettagli Preventivo</h3><hr>`;
  html += `<p><strong>ID:</strong> ${id}</p>`;
  html += `<p><strong>Nome:</strong> ${p.nome || '-'}</p>`;
  html += `<p><strong>Email:</strong> ${p.email || '-'}</p>`;

function aggiornaStatoPreventivo(id, nuovoStato) {
  const docRef = db.collection("preventivi").doc(id);
  const campoData = nuovoStato === "approvato" ? "dataApprovazione" : "dataRifiuto";
  const payload = {
    stato: nuovoStato,
    [campoData]: firebase.firestore.Timestamp.now()
  };

  docRef.update(payload).then(() => {
    alert("✅ Preventivo aggiornato");
    location.reload(); // reload semplice
  }).catch(err => {
    alert("Errore durante l'aggiornamento");
    console.error(err);
  });
}


function calcolaCountdown(dataApprovazione) {
  const scadenza = new Date(dataApprovazione.toDate().getTime() + 7 * 24 * 60 * 60 * 1000);
  const now = new Date();
  const diff = scadenza - now;
  if (diff <= 0) return "❌ Scaduto";
  const giorni = Math.floor(diff / (1000 * 60 * 60 * 24));
  const ore = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minuti = Math.floor((diff / (1000 * 60)) % 60);
  return `⏳ Scade tra ${giorni}g ${ore}h ${minuti}m`;
}
