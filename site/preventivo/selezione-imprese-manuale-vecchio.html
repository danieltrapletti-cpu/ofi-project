<script>
  function toggleMenu(show) {
    const nav = document.querySelector('#ofi-nav ul');
    const btnOpen = document.getElementById('ofi-menu-toggle');
    const btnClose = document.getElementById('ofi-menu-close');

    if (show) {
      nav.classList.add('show');
      btnOpen.classList.add('hidden');
      btnClose.classList.remove('hidden');
    } else {
      nav.classList.remove('show');
      btnOpen.classList.remove('hidden');
      btnClose.classList.add('hidden');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    const links = document.querySelectorAll('#ofi-nav a');
    links.forEach(link => {
      link.addEventListener('click', () => toggleMenu(false));
    });
  });
</script>
<h1>Seleziona le Imprese per il Servizio</h1>
<div id="mappa"></div>
<div id="imprese-container"></div>
<div class="btn-container" style="display:flex; justify-content:center; gap:20px; flex-wrap:wrap; margin-top:40px;">
<button class="btn-altre" onclick="caricaAltre()">📍 Vedi altre imprese</button>
<button class="btn-continua" onclick="prosegui()">✅ Continua con queste imprese</button>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAy0UMiRscG-F1B9YxT7gHHyxLBOwOo2vs",
      authDomain: "ofi2025-51ba9.firebaseapp.com",
      projectId: "ofi2025-51ba9",
      storageBucket: "ofi2025-51ba9.appspot.com",
      messagingSenderId: "345581339212",
      appId: "1:345581339212:web:f0b8bc241945691c876ae9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const userLat = parseFloat(params.get('lat'));
    const userLon = parseFloat(params.get('lon'));
    const comune = params.get('comune');

    mapboxgl.accessToken = 'pk.eyJ1IjoiZHQ4MiIsImEiOiJjbWFtem4xN2Ewbmx4Mm1zZHgzaGRhbXZzIn0.RwNWi1alAkO61qgd3AjEsg';
    const map = new mapboxgl.Map({
      container: 'mappa',
      style: 'mapbox://styles/mapbox/streets-v11',
      center: [userLon, userLat],
      zoom: 10
    });

    new mapboxgl.Marker({ color: '#cfa349' })
      .setLngLat([userLon, userLat])
      .addTo(map);

    const container = document.getElementById('imprese-container');
    let tutte = [];
    let bloccoCorrente = 0;

    function distanzaKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    async function caricaImprese() {
      const snap = await getDocs(collection(db, 'imprese_demo'));
      snap.forEach(doc => {
        const d = doc.data();
        if (!d.lat || !d.lon) return;
        d.distanza = distanzaKm(userLat, userLon, d.lat, d.lon);
        tutte.push(d);
      });
      tutte.sort((a, b) => a.distanza - b.distanza);
      caricaAltre();
    }

    window.__caricaAltreFunzione = function() {
      const inizio = bloccoCorrente * 10;
      const fine = inizio + 10;
      const subset = tutte.slice(inizio, fine);
      subset.forEach(imp => {
        let badgeLabel = "";
        let fallbackCopertina = "rosa.png";
        switch (imp.badge) {
          case "base": badgeLabel = "Partner Attivo"; fallbackCopertina = "base-copertina.png"; break;
          case "presente": badgeLabel = "Presente su OFI"; fallbackCopertina = "presente-copertina.png"; break;
          case "certificata": badgeLabel = "Certificata"; fallbackCopertina = "certificate-copertina.png"; break;
          case "top": badgeLabel = "Top Partner"; fallbackCopertina = "top-copertina.png"; break;
        }

        const stelle = (imp.stelleAttuali && imp.stelleAttuali > 0) ? '⭐'.repeat(imp.stelleAttuali) + ` <span style="color:#666; font-size:13px;">Valutazione</span>` : "";
        const badgeHtml = badgeLabel ? `<span class="badge ${imp.badge}">${badgeLabel}</span>` : "";
        const sigilloHtml = (imp.sigillo === true && imp.tipoAbbonamento) ? `
  <a href="../preventivo/marchio.html" class="sigillo-badge">
    <img src="../images/sigillo-ofi.png" alt="Sigillo OFI"/>
    <span>Marchio di Affidabilità Nazionale</span>
  </a>
` : "";
        const logo = imp.logo ? imp.logo : 'rosa.png';
        const copertinaImg = imp.copertina ? imp.copertina : fallbackCopertina;
        const copertina = `style="background-image:url('../images/${copertinaImg}');"`;
        const descrizione = imp.descrizione ? (imp.descrizione.length > 200 ? imp.descrizione.slice(0, 200) + '…' : imp.descrizione) : "";
        const social = `
          ${imp.facebook ? `<a href="${imp.facebook}" target="_blank" aria-label="Facebook"><img src="../images/facebook.svg" width="20"/></a>` : ''}
          ${imp.instagram ? `<a href="${imp.instagram}" target="_blank" aria-label="Instagram"><img src="../images/instagram.svg" width="20"/></a>` : ''}
          ${imp.youtube ? `<a href="${imp.youtube}" target="_blank" aria-label="YouTube"><img src="../images/youtube.svg" width="20"/></a>` : ''}
        `;

        const div = document.createElement('div');
        div.className = 'card-impresa';
        div.innerHTML = `
          <div class="card-copertina" ${copertina}></div>
          <div class="card-contenuto">
            <div class="card-header">
              <img class="card-logo" src="../images/${logo}" alt="Logo ${imp.nomeImpresa || 'Impresa'}"/>
              <div>
                <h2>${imp.nomeImpresa}</h2>
                <div class="card-info">${imp.comune} • ${Math.round(imp.distanza)} km</div>
                ${badgeHtml}
                <div class="stelle">${stelle}</div>
              </div>
            </div>
            <div class="card-descrizione">${descrizione}</div>
            <div class="card-footer">
              <small>${imp.id_ofi || ''}</small>
              <div>${sigilloHtml} ${social}</div>
            </div>
            <div class="checkbox-custom">
              <input type="checkbox" value="${imp.email}" data-nome="${imp.nomeImpresa}"> Seleziona
            </div>
          </div>
        `;
        container.appendChild(div);
        new mapboxgl.Marker({ color: '#002c5d' })
          .setLngLat([imp.lon, imp.lat])
          .addTo(map);
      });
      bloccoCorrente++;
    }

    
    
function prosegui() {
  const checkboxes = document.querySelectorAll('.checkbox-custom input:checked');
  if (checkboxes.length === 0) {
    alert("Seleziona almeno un’impresa per proseguire.");
    return;
  }
  const selezionate = Array.from(checkboxes).map(c => ({
    email: c.value,
    nomeImpresa: c.dataset.nome
  }));
  localStorage.setItem('impreseSelezionate', JSON.stringify(selezionate));
  window.location.href = 'richiedi-preventivo.html?modalita=manuale';
}

// Limita massimo 10 selezioni
document.addEventListener("change", (e) => {
  if (e.target.matches('.checkbox-custom input')) {
    const selezionate = document.querySelectorAll('.checkbox-custom input:checked');
    if (selezionate.length > 10) {
      e.target.checked = false;
      alert("Puoi selezionare al massimo 10 imprese.");
    }
  }
});

caricaImprese();
  


// Attiva/disattiva pulsante continua
function aggiornaStatoPulsante() {
  const checked = document.querySelectorAll('.checkbox-custom input:checked').length;
  const btn = document.querySelector('.btn-continua');
  if (checked > 0) {
    btn.disabled = false;
    btn.style.background = '#003366';
    btn.style.color = 'white';
    btn.style.cursor = 'pointer';
  } else {
    btn.disabled = true;
    btn.style.background = '#ccc';
    btn.style.color = '#444';
    btn.style.cursor = 'not-allowed';
  }
}
document.addEventListener("change", (e) => {
  if (e.target.matches('.checkbox-custom input')) {
    const selezionate = document.querySelectorAll('.checkbox-custom input:checked');
    if (selezionate.length > 10) {
      e.target.checked = false;
      alert("Puoi selezionare al massimo 10 imprese.");
    }
    aggiornaStatoPulsante();
  }
});
window.addEventListener("DOMContentLoaded", aggiornaStatoPulsante);
</script>

<script>
// Queste funzioni devono essere globali per funzionare con i bottoni onclick

window.caricaAltre = function() {
  if (!window.__caricaAltreFunzione) return;
  window.__caricaAltreFunzione();
};

window.prosegui = function() {
  const checkboxes = document.querySelectorAll('.checkbox-custom input:checked');
  if (checkboxes.length === 0) {
    alert("Seleziona almeno un’impresa per proseguire.");
    return;
  }
  const selezionate = Array.from(checkboxes).map(c => ({
    email: c.value,
    nomeImpresa: c.dataset.nome
  }));
  localStorage.setItem('impreseSelezionate', JSON.stringify(selezionate));
  window.location.href = 'richiedi-preventivo.html?modalita=manuale';
};
