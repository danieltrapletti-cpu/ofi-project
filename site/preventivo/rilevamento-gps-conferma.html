
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Geolocalizzazione con Conferma</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }
    button {
      background: #002b5c;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
    }
    #output {
      margin-top: 2rem;
      padding: 1rem;
      border-radius: 8px;
      background: #f1f3f6;
      color: #002b5c;
    }
  </style>
</head>
<body>
  <h1>📍 Verifica la tua posizione</h1>
  <p>Clicca il pulsante per rilevare la tua posizione e confermare se è corretta.</p>
  <button onclick="rilevaPosizione()">Rileva posizione</button>
  <div id="output"></div>

  <script>
    function rilevaPosizione() {
      const output = document.getElementById("output");
      output.innerHTML = "⏳ Rilevamento posizione in corso...";

      if (!navigator.geolocation) {
        output.innerHTML = "❌ Il tuo browser non supporta la geolocalizzazione.";
        return;
      }

      navigator.geolocation.getCurrentPosition(success, error);

      function success(pos) {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
          .then(res => res.json())
          .then(data => {
            const address = data.address;
            const location = `${address.road || ""}, ${address.city || address.town || address.village || address.municipality || ""}`;
            const conferma = confirm(`📍 Abbiamo rilevato questa posizione:
${location}

È corretta?`);
            if (conferma) {
              output.innerHTML = `✅ Posizione confermata: ${location}`;
            } else {
              output.innerHTML = "✏️ Inserisci manualmente il tuo comune nel modulo.";
            }
          })
          .catch(() => {
            output.innerHTML = "❌ Errore nel recupero dell'indirizzo.";
          });
      }

      function error(err) {
        output.innerHTML = "❌ Geolocalizzazione fallita. Hai rifiutato l'autorizzazione o c'è stato un errore.";
      }
    }
  </script>
</body>
</html>
