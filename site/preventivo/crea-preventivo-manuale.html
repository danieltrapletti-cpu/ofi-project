<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Seleziona Imprese Funebri | OFI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Seleziona le imprese funebri della tua zona per inviare una richiesta di preventivo.">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f5f6fa;
    }
    header img {
      max-width: 220px;
      display: block;
      margin: 1rem auto;
    }
    h1 {
      text-align: center;
      color: #002c5d;
      margin-top: 0.5rem;
    }
    #mappa {
      width: 100%;
      height: 300px;
      margin: 1rem auto;
      border-radius: 10px;
    }
    .lista-imprese {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin: 2rem auto;
      max-width: 1000px;
    }
    .card-impresa {
      background: white;
      border-radius: 10px;
      border: 1px solid #ccc;
      padding: 1rem;
      width: 300px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: left;
    }
    .card-impresa input[type="checkbox"] {
      margin-right: 10px;
    }
    button {
      background-color: #002c5d;
      color: white;
      padding: 0.9rem 2rem;
      font-size: 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      display: block;
      margin: 2rem auto 1rem;
    }
    button:hover {
      background-color: #004080;
    }
    #altre-imprese {
      text-align: center;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

<header>
  <a href="../index.html"><img src="../images/logo-ofi.png" alt="Onoranze Funebri Italia"></a>
</header>

<h1>Seleziona le Imprese per la tua Richiesta</h1>

<div id="mappa"></div>

<div class="lista-imprese" id="imprese-container">
  <!-- Card imprese generate dinamicamente -->
</div>

<div id="altre-imprese">
  <button onclick="mostraAltre()">Mostra altre imprese</button>
</div>

<button onclick="prosegui()">Continua con queste imprese</button>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const lat = parseFloat(urlParams.get('lat')) || 42.5;
  const lon = parseFloat(urlParams.get('lon')) || 12.5;
  const comune = urlParams.get('comune') || "";

  let imprese = [];  // da caricare da Firebase o file mock
  let visibili = 0;
  const maxVisualizzate = 10;
  const maxSelezionate = 10;

  mapboxgl.accessToken = 'pk.eyJ1IjoiZHQ4MiIsImEiOiJjbWFtem4xN2Ewbmx4Mm1zZHgzaGRhbXZzIn0.RwNWi1alAkO61qgd3AjEsg';
  const mappa = new mapboxgl.Map({
    container: 'mappa',
    style: 'mapbox://styles/mapbox/streets-v11',
    center: [lon, lat],
    zoom: 11
  });

  function generaMock() {
    // mock per test
    for (let i = 0; i < 25; i++) {
      imprese.push({
        nome: "Impresa Funebre " + (i+1),
        email: "impresa" + (i+1) + "@esempio.com",
        indirizzo: "Via Test " + (i+1),
        distanza: (Math.random()*10).toFixed(1),
        id: "impresa" + (i+1)
      });
    }
    imprese = imprese.sort(() => 0.5 - Math.random());
  }

  function mostraImprese() {
    const container = document.getElementById("imprese-container");
    for (let i = visibili; i < visibili + maxVisualizzate && i < imprese.length; i++) {
      const impresa = imprese[i];
      const card = document.createElement("div");
      card.className = "card-impresa";
      card.innerHTML = `
        <label>
          <input type="checkbox" value="${impresa.email}" onchange="limitaSelezione(this)">
          <strong>${impresa.nome}</strong><br/>
          ${impresa.indirizzo}<br/>
          📍 ~${impresa.distanza} km
        </label>
      `;
      container.appendChild(card);
    }
    visibili += maxVisualizzate;
    if (visibili >= imprese.length) {
      document.getElementById("altre-imprese").style.display = "none";
    }
  }

  function mostraAltre() {
    mostraImprese();
  }

  function limitaSelezione(chk) {
    const selezionati = document.querySelectorAll('input[type="checkbox"]:checked');
    if (selezionati.length > maxSelezionate) {
      chk.checked = false;
      alert("Puoi selezionare al massimo 10 imprese.");
    }
  }

  function prosegui() {
    const selezionati = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(i => i.value);
    if (selezionati.length === 0) {
      alert("Seleziona almeno un'impresa.");
      return;
    }
    const query = `../preventivo/richiedi-preventivo-FINALE.html?modalita=manuale&imprese=${encodeURIComponent(selezionati.join(","))}`;
    window.location.href = query;
  }

  // Inizializza
  generaMock();
  mostraImprese();
</script>

</body>
</html>
