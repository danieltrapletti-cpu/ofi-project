
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Necrologio Singolo</title>
  <link rel="stylesheet" href="../style.css" />
  <script defer src="script.js"></script>
</head>
<body>
  <header class="main-header">
    <div class="logo-container">
      <img src="../images/logo-ofi.png" alt="Logo OFI" class="site-logo"/>
    </div>
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../preventivo/index.html">Richiedi Preventivo</a></li>
        <li><a href="../necrologi.html">Necrologi</a></li>
        <li><a href="../informazioni.html">Informazioni Utili</a></li>
        <li><a href="../imprese.html">Area Imprese</a></li>
      </ul>
    </nav>
  </header>

  <main class="necrologio-container">
    <div id="necrologioContent" class="necrologio-card"></div>

    <section id="pensieri-section">
      <h2>Pensieri lasciati</h2>
      <div id="pensieriList"></div>

      <form id="formPensiero">
        <h3>Scrivi un pensiero in memoria</h3>
        <input type="text" id="nomePensiero" placeholder="Il tuo nome" required />
        <textarea id="testoPensiero" placeholder="Il tuo pensiero..." rows="4" required></textarea>
        <label><input type="checkbox" required /> Accetto la Privacy Policy</label>
        <button type="submit">Invia il Pensiero</button>
      </form>
    </section>

    <div class="back-link">
      <a href="../necrologi.html">&larr; Torna alla pagina necrologi</a>
    </div>
  </main>

  <footer>
    <div id="firmaNecrologio"></div>
    <p>&copy; 2025 Onoranze Funebri Italia - Tutti i diritti riservati</p>
  </footer>
</body>
</html>
