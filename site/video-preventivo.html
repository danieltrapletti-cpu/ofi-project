<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Invito OFI</title>
  <style>
    body {
      background: #f8f9fa;
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      color: #0d3b66;
      text-align: center;
    }
    .container {
      max-width: 820px;
      margin: 2rem auto;
      padding: 1.5rem;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }
    .logo {
      max-width: 220px;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.9rem;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.1rem;
      margin: 0.5rem 0 1rem;
    }
    video {
      width: 100%;
      border-radius: 14px;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
      margin: 1.5rem 0;
    }
    .btn {
      background: #0d3b66;
      color: white;
      padding: 14px 26px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      display: inline-block;
      margin-top: 1.5rem;
      font-size: 1.1rem;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #002c5d;
    }
    footer {
      margin-top: 2.5rem;
      font-size: 0.95rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/OFI-Logo.png" alt="Logo OFI" class="logo" />

    <h1>📬 Hai ricevuto un preventivo ufficiale</h1>
    <p>Guarda questo breve video per capire come rispondere correttamente tramite il Portale Nazionale OFI.</p>

    <video controls autoplay>
      <source src="videos/video-preventivo.mp4" type="video/mp4">
      Il tuo browser non supporta il formato video HTML5.
    </video>

    <a class="btn" href="/imprese-dashboard.html">🔐 Accedi alla tua dashboard</a>

    <footer>
      Onoranze Funebri Italia • Servizio Nazionale per Imprese e Cittadini
    </footer>
  </div>
</body>
</html>
