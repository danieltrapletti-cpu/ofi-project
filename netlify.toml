# =========================
# netlify.toml - OFI 2025
# =========================

# --- BUILD ---
[build]
  publish = "site"
  functions = "netlify/functions"

# forza runtime compatibile con firebase-admin@13
[build.environment]
  NODE_VERSION = "20"

# --- FUNCTIONS ---
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin", "ffmpeg-static", "ffprobe-static"]
  included_files = [
    "node_modules/ffmpeg-static/**",
    "node_modules/ffprobe-static/**"
  ]

# --- REDIRECT: Pensiero del Giorno dinamico ---
[[redirects]]
  from = "/p/:date"
  to = "/.netlify/functions/pensiero-page?d=:date"
  status = 200
  force = true

# --- REDIRECT: SHARE NECROLOGIO (ANTEPRIMA SOCIAL) ---
# Deve stare PRIMA del catch-all 404
[[redirects]]
  from = "/share/necrologio"
  to = "/.netlify/functions/shareNecrologio"
  status = 200
  force = true

# --- SECURITY & CSP ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # ⚠️ RIMOSSE perché bloccano Firebase Auth popup
    # Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    # Cross-Origin-Embedder-Policy = "credentialless"

    Cross-Origin-Resource-Policy = "same-site"
    Permissions-Policy = "geolocation=(self), microphone=(), camera=()"
    Content-Security-Policy = """
      default-src 'self';

      script-src 'self' 'unsafe-inline' 'unsafe-eval'
        https://www.google.com https://www.gstatic.com https://apis.google.com
        https://accounts.google.com https://www.googletagmanager.com
        https://www.google-analytics.com https://maps.googleapis.com
        https://maps.gstatic.com https://api.mapbox.com
        https://cdn.jsdelivr.net;

      script-src-elem 'self' 'unsafe-inline' 'unsafe-eval'
        https://www.google.com https://www.gstatic.com https://apis.google.com
        https://accounts.google.com https://www.googletagmanager.com
        https://www.google-analytics.com https://maps.googleapis.com
        https://maps.gstatic.com https://api.mapbox.com
        https://cdn.jsdelivr.net;

      connect-src 'self'
        https://*.netlify.app https://www.google.com https://www.gstatic.com
        https://cdn.jsdelivr.net
        https://www.googleapis.com https://maps.googleapis.com
        https://maps.gstatic.com
        https://*.googleapis.com
        https://*.gstatic.com
        https://places.googleapis.com
        https://api.mapbox.com https://events.mapbox.com
        https://identitytoolkit.googleapis.com https://securetoken.googleapis.com
        https://firestore.googleapis.com
        https://firebasestorage.googleapis.com https://storage.googleapis.com https://*.firebasestorage.app
        https://recaptcha.net https://www.recaptcha.net
        https://us-central1-ofi2025-51ba9.cloudfunctions.net
        https://europe-west1-ofi2025-51ba9.cloudfunctions.net
        https://*.cloudfunctions.net
        https://ofi2025-51ba9.firebaseapp.com https://ofi2025-51ba9.web.app
        https://nominatim.openstreetmap.org
        https://firebaseinstallations.googleapis.com
        https://fcmregistrations.googleapis.com;

      img-src 'self' data: blob:
        https://* https://*.netlify.app
        https://maps.googleapis.com https://maps.gstatic.com
        https://api.mapbox.com https://*.tiles.mapbox.com
        https://firebasestorage.googleapis.com https://*.firebasestorage.app
        https://lh3.googleusercontent.com https://www.gstatic.com;

      media-src 'self' data: blob:
        https://firebasestorage.googleapis.com https://storage.googleapis.com https://*.firebasestorage.app;

      style-src 'self' 'unsafe-inline'
        https://fonts.googleapis.com https://api.mapbox.com https://cdnjs.cloudflare.com;

      font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:;

      frame-src 'self'
        https://www.google.com https://recaptcha.net https://www.recaptcha.net
        https://www.youtube.com https://www.youtube-nocookie.com
        https://accounts.google.com
        https://ofi2025-51ba9.firebaseapp.com https://ofi2025-51ba9.web.app;

      worker-src 'self' blob:;
      object-src 'none';
      base-uri 'self';

      form-action 'self'
        https://accounts.google.com
        https://ofi2025-51ba9.firebaseapp.com https://ofi2025-51ba9.web.app;
    """

# --- CACHE ---
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- CUSTOM 404 PAGE (DEVE ESSERE L'ULTIMA REGOLA) ---
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404